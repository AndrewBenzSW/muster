version: 2

before:
  hooks:
    - go mod download
    - go mod verify

builds:
  - id: muster
    binary: muster
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/abenz1267/muster/cmd.version={{.Version}}
      - -X github.com/abenz1267/muster/cmd.commit={{.Commit}}
      - -X github.com/abenz1267/muster/cmd.date={{.Date}}
    mod_timestamp: '{{.CommitTimestamp}}'

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: 'muster_{{.Version}}_{{.Os}}_{{.Arch}}'
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
  groups:
    - title: Features
      regexp: '^feat:'
    - title: Bug Fixes
      regexp: '^fix:'
    - title: Others
      order: 999

snapshot:
  name_template: '{{ incpatch .Version }}-next'
