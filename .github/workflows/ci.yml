# Cross-Platform CI Workflow
#
# This workflow tests the codebase on all three major platforms:
# - ubuntu-latest (Linux): Tests Unix path handling, /tmp directory, LF line endings
# - macos-latest (macOS): Tests Unix path handling, /var/folders temp, LF line endings
# - windows-latest (Windows): Tests Windows path handling, %TEMP% directory, native PowerShell
#
# Platform-specific considerations:
# - Path separators: filepath.Join() handles / vs \ automatically
# - Temp directories: os.TempDir() returns platform-appropriate locations
# - Config directories: os.UserConfigDir() returns ~/.config (Linux), ~/Library/Application Support (macOS), %AppData% (Windows)
# - Line endings: Tests verify LF (\n) is preserved across all platforms
# - Race detector: Enabled to catch concurrency issues that may be platform-specific
# - Coverage: Collected per-platform to identify platform-specific code paths
#
# Go's standard library provides excellent cross-platform abstractions, but tests
# explicitly verify correct behavior on each platform using runtime.GOOS conditionals.

name: CI

on:
  push:
    branches: ['**']  # Run on all branches
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests with race detector
        run: go test -v -race ./...

      - name: Run tests with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload coverage to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.out
          retention-days: 30

      - name: Build binary
        run: make build
        shell: bash

      - name: Smoke test - version command
        run: ./dist/muster version
        shell: bash

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: golangci/golangci-lint-action@v7
        with:
          version: "v2.11.3"
          args: --timeout=5m
