# Squid proxy configuration for muster dev-agent network isolation

# Listen on port 3128
http_port 3128

# ACL definitions
acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"
acl SSL_ports port 443
acl Safe_ports port 80          # http
acl Safe_ports port 443         # https
acl CONNECT method CONNECT

# Deny requests to non-safe ports
http_access deny !Safe_ports

# Deny CONNECT to non-SSL ports
http_access deny CONNECT !SSL_ports

# Allow localhost connections (container internal)
acl localhost src 127.0.0.1/32 ::1
http_access allow localhost

# Allow all source IPs from Docker network
acl docker_network src 172.16.0.0/12 10.0.0.0/8 192.168.0.0/16
http_access allow docker_network allowed_domains

# Deny all other access
http_access deny all

# Cache settings (minimal cache for dev agent)
cache deny all

# Logging
access_log /dev/stdout squid
cache_log /dev/stderr

# DNS options
dns_nameservers 8.8.8.8 8.8.4.4

# Timeouts
connect_timeout 30 seconds
read_timeout 300 seconds
request_timeout 300 seconds
