# Complete user config with all fields
defaults:
  tool: claude-code
  provider: anthropic
  model: claude-sonnet-4.5

tools:
  claude-code:
    model_tiers:
      fast: claude-sonnet-4.5
      standard: claude-sonnet-4.5
      deep: claude-opus-4
    max_tokens: 8192
    temperature: 0.7
  cursor:
    model_tiers:
      fast: gpt-4o-mini
      standard: gpt-4o
      deep: gpt-4o
    max_tokens: 4096
    temperature: 0.8

providers:
  anthropic:
    api_key_env: ANTHROPIC_API_KEY
    base_url: https://api.anthropic.com
    timeout: 300
  openai:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    timeout: 180

model_tiers:
  fast: claude-sonnet-4.5
  standard: claude-sonnet-4.5
  deep: claude-opus-4
