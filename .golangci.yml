version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - gosec
    - gocyclo
  settings:
    gocyclo:
      min-complexity: 35  # runDockerFlow orchestration sits at 32

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 0  # report all issues
  max-same-issues: 0        # report all duplicate issues
