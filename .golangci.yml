run:
  timeout: 5m

linters:
  enable:
    - gofmt
    - govet
    - staticcheck
    - errcheck
    - gosec
    - gocyclo

issues:
  max-issues-per-linter: 0  # report all issues
  max-same-issues: 0        # report all duplicate issues

linters-settings:
  gocyclo:
    min-complexity: 15  # reasonable for CLI code
